<!DOCTYPE html>
<html>
<head>
  <title>Clear Mozi Login Cookies</title>
  <style>
    body {
      width: 300px;
      min-height: 200px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background-color: #f8f9fa;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
    }
    
    .header h1 {
      font-size: 18px;
      color: #333;
      margin: 0;
    }
    
    .header p {
      font-size: 12px;
      color: #666;
      margin: 5px 0 0 0;
    }
    
    .button-container {
      margin-bottom: 15px;
    }
    
    button {
      width: 100%;
      padding: 12px;
      font-size: 14px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 0.2s;
    }
    
    .primary-btn {
      background-color: #007bff;
      color: white;
    }
    
    .primary-btn:hover {
      background-color: #0056b3;
    }
    
    .primary-btn:disabled {
      background-color: #6c757d;
      cursor: not-allowed;
    }
    
    .secondary-btn {
      background-color: #6c757d;
      color: white;
      margin-top: 8px;
    }
    
    .secondary-btn:hover {
      background-color: #545b62;
    }
    
    .status {
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      margin-top: 10px;
      display: none;
    }
    
    .status.success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .status.error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }
    
    .status.info {
      background-color: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
    
    .loading {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid #f3f3f3;
      border-top: 2px solid #007bff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .domain-info {
      background-color: #e9ecef;
      padding: 8px;
      border-radius: 4px;
      font-size: 11px;
      color: #495057;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Cookie Cleaner</h1>
    <p>Clear cookies for Mozi Login</p>
  </div>
  
  <div class="domain-info">
    Target: <strong>mozi-login.alibaba.net</strong>
  </div>
  
  <div class="button-container">
    <button id="clearCookies" class="primary-btn">Clear Cookies</button>
    <button id="checkCookies" class="secondary-btn">Check Cookies</button>
  </div>
  
  <div id="status" class="status"></div>
  
  <script src="popup.js"></script>
</body>
</html>
